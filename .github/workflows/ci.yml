name: CI build

on:
  push:
    branches: [ "**" ]
    paths-ignore:
      - "build-yg/**"
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-web-emscripten:
    name: Build for Web (Emscripten)
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Setup Emscripten SDK
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: latest

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Compile PvZ-Portable for Web
      run: |
        emcmake cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Place web artifact in repository
      run: |
        mkdir -p build-yg
        rm -f build-yg/index.html build-yg/index.js build-yg/index.wasm build-yg/index.data build-yg/index.worker.js build-yg/index.wasm.map
        for f in build/index.html build/index.js build/index.wasm build/index.data build/index.worker.js build/index.wasm.map; do
          if [ -f "$f" ]; then
            cp "$f" build-yg/
          fi
        done
        test -f build-yg/index.html

    - name: Commit web artifact to repository
      if: github.event_name == 'push'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A build-yg
        if git diff --cached --quiet; then
          echo "No artifact changes to commit."
          exit 0
        fi
        git commit -m "chore: update web build artifact [skip ci]"
        git push origin HEAD:${{ github.ref_name }}
