name: CI build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "web-build/**"
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-web-emscripten:
    name: Build for Web (Emscripten)
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
    - uses: actions/checkout@v4

    - name: Setup Emscripten SDK
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: latest

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Compile PvZ-Portable for Web
      run: |
        emcmake cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Place web artifact in repository
      run: |
        mkdir -p web-build
        for f in build/index.html build/index.js build/index.wasm build/index.data build/index.worker.js build/index.wasm.map; do
          if [ -f "$f" ]; then
            cp "$f" web-build/
          fi
        done
        test -f web-build/index.html

    - name: Commit web artifact to repository
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add web-build
        if git diff --cached --quiet; then
          echo "No artifact changes to commit."
          exit 0
        fi
        git commit -m "chore: update web build artifact [skip ci]"
        git push
